<!-- Arquivo: html/teste_api.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Teste API</title>
</head>
<body>
    <h1>Teste de Conexão com API</h1>
    
    <button onclick="testarAPI()">Testar API Login</button>
    <button onclick="testarCaminho()">Testar Caminho</button>
    
    <div id="resultado"></div>

    <script>
        async function testarAPI() {
            const resultado = document.getElementById('resultado');
            resultado.innerHTML = 'Testando...';
            
            try {
                const response = await fetch('../backend/api/login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'teste@email.com',
                        senha: '123456'
                    })
                });
                
                const data = await response.text();
                resultado.innerHTML = `
                    <h3>Status: ${response.status}</h3>
                    <pre>${data}</pre>
                `;
            } catch (error) {
                resultado.innerHTML = `
                    <h3 style="color: red;">ERRO: ${error.message}</h3>
                    <p>URL tentada: ../backend/api/login.php</p>
                `;
            }
        }

        async function testarCaminho() {
            const resultado = document.getElementById('resultado');
            
            // Testar diferentes caminhos
            const caminhos = [
                '../backend/api/login.php',
                'backend/api/login.php',
                '/backend/api/login.php',
                './backend/api/login.php'
            ];
            
            for (let caminho of caminhos) {
                try {
                    const response = await fetch(caminho);
                    resultado.innerHTML += `<p>${caminho}: ${response.status}</p>`;
                } catch (error) {
                    resultado.innerHTML += `<p style="color: red;">${caminho}: ERRO - ${error.message}</p>`;
                }
            }
        }
    </script>
</body>
</html>
